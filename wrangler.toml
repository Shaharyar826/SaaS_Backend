name = "eduflow-api"
main = "worker/index.js"
compatibility_date = "2024-09-23"

# Required for mongoose, bcryptjs, jsonwebtoken, nodemailer, crypto, events, etc.
compatibility_flags = ["nodejs_compat"]

# ── Cron triggers (replaces node-cron) ──────────────────────────────────────
[triggers]
crons = [
  "0 2 1 * *",   # Monthly billing — 1st of month at 02:00 UTC
  "0 6 * * *",   # Overdue bill updates — daily at 06:00 UTC
]

# ── Environment variables (non-secret, safe to commit) ──────────────────────
[vars]
NODE_ENV = "production"
DISABLE_CRON = "true"
WORKER_SELF_URL = "https://eduflow-api.shaharyarali110786.workers.dev"

# ── Secrets — run `wrangler secret put <KEY>` for each ──────────────────────
# REQUIRED before first deploy:
# wrangler secret put MONGODB_URI
# wrangler secret put JWT_SECRET
# wrangler secret put JWT_REFRESH_SECRET
# wrangler secret put COOKIE_DOMAIN            # leave empty (no custom domain yet)
# wrangler secret put ALLOWED_ORIGINS          # https://saas-learnify.pages.dev
# wrangler secret put FRONTEND_URL             # https://saas-learnify.pages.dev
# wrangler secret put CRON_SECRET              # run: openssl rand -hex 32
# wrangler secret put CLOUDINARY_CLOUD_NAME
# wrangler secret put CLOUDINARY_API_KEY
# wrangler secret put CLOUDINARY_API_SECRET
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put STRIPE_STARTER_MONTHLY_PRICE_ID
# wrangler secret put STRIPE_PROFESSIONAL_MONTHLY_PRICE_ID
# wrangler secret put STRIPE_ENTERPRISE_MONTHLY_PRICE_ID
# wrangler secret put STRIPE_STARTER_YEARLY_PRICE_ID
# wrangler secret put STRIPE_PROFESSIONAL_YEARLY_PRICE_ID
# wrangler secret put STRIPE_ENTERPRISE_YEARLY_PRICE_ID
# wrangler secret put SMTP_HOST
# wrangler secret put SMTP_PORT
# wrangler secret put SMTP_USER
# wrangler secret put SMTP_PASS
# wrangler secret put FROM_EMAIL
# wrangler secret put GOOGLE_CLIENT_ID
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put SUPER_ADMIN_EMAIL
# wrangler secret put SUPER_ADMIN_PASSWORD
# wrangler secret put BCRYPT_ROUNDS            # 12
# wrangler secret put R2_PUBLIC_URL            # leave blank for now (bucket is private)

# ── Local development overrides ──────────────────────────────────────────────
[env.development]
vars = { NODE_ENV = "development", WORKER_SELF_URL = "http://localhost:5000" }
